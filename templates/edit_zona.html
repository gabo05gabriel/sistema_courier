{% extends 'base.html' %}

{% block title %}Editar Zona - Courier System{% endblock %}

{% block content %}
<h1>Editar Zona</h1>
<form action="{{ url_for('edit_zona', id=zona.zona_id) }}" method="POST">
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="nombre" value="{{ zona.nombre }}" required><br><br>
    <button type="submit">Guardar</button>
</form>
{% endblock %}
