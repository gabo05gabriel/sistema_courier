{% extends 'base.html' %}

{% block title %}Rutas - Courier System{% endblock %}

{% block content %}
<h1>Rutas</h1>
<a href="{{ url_for('add_ruta') }}">Agregar nueva Ruta</a>
<ul>
    {% for ruta in rutas %}
    <li>{{ ruta.nombre }} - {{ ruta.zona.nombre if ruta.zona }}
        <a href="{{ url_for('edit_ruta', id=ruta.ruta_id) }}">Editar</a>
        <a href="{{ url_for('delete_ruta', id=ruta.ruta_id) }}">Eliminar</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
