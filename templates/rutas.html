{% extends 'base.html' %}

{% block title %}Rutas - Courier System{% endblock %}

{% block content %}
<h1>Mapa de Rutas</h1>

<!-- Contenedor del mapa -->
<div id="map" style="height: 500px; width: 100%;"></div>

<!-- Script de Google Maps (SIN callback) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCtcsaHbE3TM3bgGfMDYXzi8mPyGDAWnZI" defer></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        initMap();
    });

    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: -16.52, lng: -68.13 }, // Cambia esto si lo deseas
            zoom: 13
        });

        // Marcador de inicio
        new google.maps.Marker({
            position: { lat: -16.52, lng: -68.13 },
            map,
            title: "Inicio de Ruta"
        });

        // Marcador de destino
        new google.maps.Marker({
            position: { lat: -16.51, lng: -68.14 },
            map,
            title: "Fin de Ruta"
        });

        // También puedes usar una línea para dibujar la ruta si lo deseas
        const rutaCoords = [
            { lat: -16.52, lng: -68.13 },
            { lat: -16.51, lng: -68.14 }
        ];

        const ruta = new google.maps.Polyline({
            path: rutaCoords,
            geodesic: true,
            strokeColor: "#FF0000",
            strokeOpacity: 1.0,
            strokeWeight: 3
        });

        ruta.setMap(map);
    }
</script>
{% endblock %}
