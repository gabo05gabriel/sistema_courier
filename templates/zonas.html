{% extends 'base.html' %}

{% block title %}Zonas - Courier System{% endblock %}

{% block content %}
<h1>Zonas</h1>
<a href="{{ url_for('add_zona') }}">Agregar nueva Zona</a>
<ul>
    {% for zona in zonas %}
    <li>{{ zona.nombre }}
        <a href="{{ url_for('edit_zona', id=zona.zona_id) }}">Editar</a>
        <a href="{{ url_for('delete_zona', id=zona.zona_id) }}">Eliminar</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
