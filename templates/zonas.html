{% extends 'base.html' %}

{% block title %}Zonas - Courier System{% endblock %}

{% block content %}
<h1>Mapa de Zonas</h1>

<!-- Contenedor del mapa -->
<div id="map" style="height: 500px; width: 100%;"></div>

<!-- Script de Google Maps (SIN callback) -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCtcsaHbE3TM3bgGfMDYXzi8mPyGDAWnZI" defer></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        initMap();
    });

    function initMap() {
        const map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: -16.5, lng: -68.15 }, // Coordenadas de La Paz, Bolivia (por ejemplo)
            zoom: 13
        });

        new google.maps.Marker({
            position: { lat: -16.5, lng: -68.15 },
            map,
            title: "Zona Central"
        });

        // Puedes agregar más marcadores para otras zonas
    }
</script>
{% endblock %}
